name: Daily Civil Service Watch

on:
  schedule:
    # Run every day at 07:00 UTC (3 AM ET)
    - cron: "0 7 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  watch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: Fetch all source pages ──────────────────────────────────
      - name: Fetch source pages
        run: python src/fetch.py

      # ── Step 2: Extract exam titles, dates, links ───────────────────────
      - name: Extract structured data
        run: python src/extract.py

      # ── Step 3: Compare with previous snapshot ──────────────────────────
      - name: Compare snapshots
        run: python src/compare.py

      # ── Step 4: Build daily report ──────────────────────────────────────
      - name: Build report
        run: python src/build_report.py

      # ── Step 5: Commit updated data + report back to repo ───────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/normalized/ \
            history/ \
            docs/latest.json \
            latest_report.md \
            latest_report.json
          if git diff --cached --quiet; then
            echo "Nothing to commit – no changes today."
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi

      # ── Step 6: Deploy GitHub Pages ─────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
